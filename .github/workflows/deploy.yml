name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # STEP 1: Detect which app changed
  # ─────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web-client: ${{ steps.filter.outputs.web-client }}
      cms: ${{ steps.filter.outputs.cms }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web-client:
              - 'apps/web-client/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'
            cms:
              - 'apps/cms/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'

  # ─────────────────────────────────────────
  # STEP 2: Deploy VPS
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.web-client == 'true' ||
      needs.detect-changes.outputs.cms == 'true'

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: CHANGED_WEB_CLIENT,CHANGED_CMS,WEB_CLIENT_ENV,CMS_ENV
          command_timeout: 30m
          script: |
            cd /root/myapp

            echo "Pulling latest code..."
            git pull origin main
            npm ci

            # Inject ENV files từ GitHub Secrets
            echo "$WEB_CLIENT_ENV" > apps/web-client/.env.production
            echo "$CMS_ENV" > apps/cms/.env.production

            # Deploy web-client
            if [ "$CHANGED_WEB_CLIENT" == "true" ]; then
              echo "Deploying web-client..."
              npx turbo build --filter=web-client
              cp -r apps/web-client/public apps/web-client/.next/standalone/apps/web-client/public
              cp -r apps/web-client/.next/static apps/web-client/.next/standalone/apps/web-client/.next/static
              pm2 reload web-client --update-env
              echo "web-client deployed!"
            fi

            # Deploy cms
            if [ "$CHANGED_CMS" == "true" ]; then
              echo "Deploying cms..."
              npx turbo build --filter=cms
              cp -r apps/cms/public apps/cms/.next/standalone/apps/cms/public
              cp -r apps/cms/.next/static apps/cms/.next/standalone/apps/cms/.next/static
              pm2 reload cms --update-env
              echo "cms deployed!"
            fi

            echo "Deploy done!"
        env:
          CHANGED_WEB_CLIENT: ${{ needs.detect-changes.outputs.web-client }}
          CHANGED_CMS: ${{ needs.detect-changes.outputs.cms }}
          WEB_CLIENT_ENV: ${{ secrets.WEB_CLIENT_ENV_PRODUCTION }}
          CMS_ENV: ${{ secrets.CMS_ENV_PRODUCTION }}